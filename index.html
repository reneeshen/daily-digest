<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f5ef">
<title>每日精選</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#f7f5ef;--card:#fbfaf5;--ink:#14110d;--ink-2:#58534a;--ink-3:#9a9488;--rule:#d9d3c6;--accent:#a04a2e;
--p1:#0a7a62;--p2:#2b4ea8;--p3:#a86a16;--p4:#6d6559;--tr:#7d3a9a;
}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif;font-size:15px;line-height:1.75;color:var(--ink);background:var(--bg);padding:20px 18px 60px;max-width:680px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;font-feature-settings:"palt"}
body[data-lang="zh"] .en{display:none}
body[data-lang="en"] .zh{display:none}
body[data-topic="design"] .t-invest{display:none}
body[data-topic="invest"] .t-design{display:none}
body[data-topic="design"] .sub-invest{display:none}
body[data-topic="invest"] .sub-design{display:none}

header{padding:8px 0 14px;border-bottom:1px solid var(--ink);margin-bottom:2px}
.brow{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-2);margin-bottom:10px}
h1{font-size:26px;font-weight:700;letter-spacing:-0.015em;line-height:1.15}
.sub{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
.lang-sw{display:inline-flex;gap:2px}
.lang-sw button{padding:3px 8px;background:transparent;border:0;font:inherit;font-size:10.5px;letter-spacing:0.14em;color:var(--ink-3);cursor:pointer;text-transform:uppercase}
.lang-sw button.on{color:var(--ink);font-weight:600;border-bottom:1.5px solid var(--ink)}
body[data-topic="invest"] .lang-sw button[data-l="en"]{opacity:0.28;pointer-events:none;cursor:not-allowed}

.topic-sw{display:flex;margin:16px 0 10px;border:1px solid var(--ink);border-radius:2px;overflow:hidden}
.topic-sw button{flex:1;padding:11px 12px;background:transparent;border:0;font:inherit;font-size:11.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-2);cursor:pointer;min-height:40px;font-weight:500;font-feature-settings:"tnum"}
.topic-sw button+button{border-left:1px solid var(--ink)}
.topic-sw button.on{background:var(--ink);color:var(--bg);font-weight:600}
.topic-sw .cnt{margin-left:5px;font-size:10px;letter-spacing:0.1em;opacity:0.6}

nav{display:flex;overflow-x:auto;gap:6px;padding:14px 0;margin:0 -18px 28px;padding-left:18px;padding-right:18px;position:sticky;top:0;background:var(--bg);z-index:5;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--rule)}
nav::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 13px;min-height:34px;border:1px solid var(--rule);border-radius:999px;background:transparent;font:inherit;font-size:12.5px;color:var(--ink-2);cursor:pointer;white-space:nowrap;touch-action:manipulation;display:inline-flex;align-items:center;gap:5px;letter-spacing:0.01em}
.tab:active{background:var(--card)}
.tab.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.pri{font-size:10.5px;color:var(--ink-3);font-weight:500;font-feature-settings:"tnum"}
.tab.active .pri{color:var(--rule)}

.card{display:none;padding-top:4px}
.card.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.meta{display:flex;flex-wrap:wrap;align-items:center;gap:7px;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.p1{background:var(--p1)}.dot.p2{background:var(--p2)}.dot.p3{background:var(--p3)}.dot.p4{background:var(--p4)}.dot.tr{background:var(--tr)}
.sep{color:var(--ink-3);opacity:0.5}
.ac{color:var(--ink-2);font-weight:500}

h2{font-size:23px;line-height:1.35;font-weight:700;letter-spacing:-0.015em;margin-bottom:14px}
.rule{height:1px;background:var(--ink);width:32px;margin:0 0 18px}
.sum{font-size:15px;line-height:1.78;margin-bottom:22px;color:var(--ink)}

.take{position:relative;background:var(--card);border-left:3px solid var(--accent);padding:14px 16px;margin-bottom:24px;font-size:14.5px;line-height:1.7;color:var(--ink)}
.take::before{display:block;font-size:10px;font-weight:600;color:var(--accent);letter-spacing:0.2em;margin-bottom:4px;text-transform:uppercase}
body[data-lang="zh"] .take::before{content:"觀　點"}
body[data-lang="en"] .take::before{content:"Take"}
.disclaimer{font-size:10.5px;letter-spacing:0.1em;color:var(--ink-3);padding:10px 0;margin-bottom:16px;border-top:1px dotted var(--rule);border-bottom:1px dotted var(--rule);text-transform:uppercase}

.link{display:inline-flex;align-items:center;gap:8px;color:var(--ink);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:8px 0;border-bottom:1px solid var(--ink);min-height:32px}
.link:active{opacity:0.6}
.urlhost{display:block;margin-top:8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;color:var(--ink-3);letter-spacing:0.02em;text-transform:none;word-break:break-all}
.urlhost.bad{color:var(--accent)}
.share{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:8px 14px;background:transparent;border:1px solid var(--rule);border-radius:999px;font:inherit;font-size:12px;letter-spacing:0.04em;color:var(--ink-2);cursor:pointer;min-height:36px;touch-action:manipulation}
.share:active{background:var(--card)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:4px;font-size:13px;letter-spacing:0.02em;z-index:100;pointer-events:none;max-width:80vw;text-align:center;animation:toastIn .2s ease}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-6px)}}

.trend{font-size:15.5px;line-height:1.8;color:var(--ink)}
.trend p{margin-bottom:14px}
.trend p:last-child{margin-bottom:0}

.foot{display:flex;gap:8px;padding-top:28px;margin-top:28px;border-top:1px solid var(--rule)}
.foot button{flex:1;padding:12px;background:transparent;border:1px solid var(--rule);font:inherit;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-2);cursor:pointer;min-height:44px}
.foot button:active{background:var(--card)}
.hint{text-align:center;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);padding-top:20px}

.loading{text-align:center;padding:60px 20px;color:var(--ink-3);font-size:12px;letter-spacing:0.16em;text-transform:uppercase}
.err{text-align:center;padding:60px 20px;color:var(--accent);font-size:13px;line-height:1.6}

@media(min-width:680px){
  body{padding:40px 28px 80px;max-width:640px}
  h1{font-size:30px}
  h2{font-size:26px}
  nav{margin:0 -28px 32px;padding-left:28px;padding-right:28px}
}
@media(hover:none){.hint{display:none}}
</style>
</head>
<body data-lang="zh" data-topic="invest">

<div id="root"><div class="loading">載入中 · Loading…</div></div>

<template id="shell">
<header>
  <div class="brow">
    <span data-slot="issue"></span>
    <div class="lang-sw" id="langsw">
      <button class="on" data-l="zh">中</button>
      <button data-l="en">EN</button>
    </div>
  </div>
  <h1 class="zh">每日精選</h1>
  <h1 class="en">Daily Digest</h1>
  <div class="sub sub-design zh">AI × UXUI · PM · Tech</div>
  <div class="sub sub-design en">AI × UXUI · PM · Tech</div>
  <div class="sub sub-invest zh">投資 · 總經 · 科技股</div>
</header>

<div class="topic-sw" id="topicsw">
  <button class="on" data-t="invest"><span class="zh">投資 · 總經</span><span class="cnt" data-cnt="invest">0</span></button>
  <button data-t="design"><span class="zh">設計 · AI</span><span class="en">Design · AI</span><span class="cnt" data-cnt="design">0</span></button>
</div>

<nav id="tabs"></nav>
<main id="cards"></main>

<div class="foot">
  <button id="prev"><span class="zh">← 上一篇</span><span class="en">← Prev</span></button>
  <button id="next"><span class="zh">下一篇 →</span><span class="en">Next →</span></button>
</div>
<div class="hint"><span class="zh">左右滑動切換　⌨ ← →</span><span class="en">Swipe to switch　⌨ ← →</span></div>
</template>

<script>
const P_CLASS={P1:'p1',P2:'p2',P3:'p3',P4:'p4'};
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const safeUrl=u=>{try{const p=new URL(String(u||''));return(p.protocol==='http:'||p.protocol==='https:')?p.href:'#'}catch{return'#'}};
const urlHost=u=>{try{const p=new URL(String(u||''));return(p.protocol==='http:'||p.protocol==='https:')?p.hostname.replace(/^www\./,''):'⚠ invalid url'}catch{return'⚠ invalid url'}};
const paragraphs=t=>String(t||'').split(/\n\s*\n/).map(p=>`<p>${esc(p.trim())}</p>`).join('');

let DATA=null;
function fmtShare(topic,a){
  // invest 類一律只有中文；design 類跟隨當下顯示語言
  const lang=(topic==='invest')?'zh':(document.body.dataset.lang||'zh');
  const L=[];
  if(lang==='en'){
    L.push(a.title_en||a.title_zh||'');
    L.push(`${a.priority||''} · ${a.category_en||a.category_zh||''} · ${a.source||''} · ${a.date||''}`);
    L.push('','【Summary】',a.summary_en||a.summary_zh||'');
    L.push('','【Take】',a.take_en||a.take_zh||'');
  }else{
    L.push(a.title_zh||'');
    L.push(`${a.priority||''} · ${a.category_zh||''} · ${a.source||''} · ${a.date||''}`);
    L.push('','【摘要】',a.summary_zh||'');
    L.push('','【觀點】',a.take_zh||'');
  }
  return L.join('\n');
}
function toast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('out'),1500);
  setTimeout(()=>{if(t.parentNode)t.remove()},1900);
}
async function shareArticle(topic,idx){
  const a=DATA&&DATA[topic]&&DATA[topic].articles&&DATA[topic].articles[idx-1];
  if(!a)return;
  const url=safeUrl(a.url);
  const payload={title:a.title_zh||'Daily Digest',text:fmtShare(topic,a),url:url==='#'?location.href:url};
  if(navigator.share){
    try{await navigator.share(payload)}catch(e){/* user cancelled */}
  }else{
    try{
      await navigator.clipboard.writeText(payload.text+'\n\n'+payload.url);
      toast('此瀏覽器不支援分享，已複製到剪貼簿');
    }catch(e){toast('分享失敗')}
  }
}

function render(data){
  DATA=data;
  const root=document.getElementById('root');
  const shell=document.getElementById('shell').content.cloneNode(true);
  root.innerHTML='';root.appendChild(shell);
  document.querySelector('[data-slot="issue"]').textContent=`No. ${String(data.issue).padStart(3,'0')} — ${data.date}`;

  const tabsEl=document.getElementById('tabs');
  const cardsEl=document.getElementById('cards');

  function renderTake(topic){
    const t=data[topic].take;
    const isZhOnly=topic==='invest';
    const ac=isZhOnly?`<span class="ac">本日總經觀察</span>`:`<span class="ac zh">本日趨勢觀察</span><span class="ac en">Daily Take</span>`;
    const disclaimer=isZhOnly?`<div class="disclaimer">※ 僅為事件解讀與趨勢脈絡，不構成投資建議</div>`:'';
    const h2=isZhOnly?`<h2>${esc(t.title_zh)}</h2>`:`<h2 class="zh">${esc(t.title_zh)}</h2><h2 class="en">${esc(t.title_en||'')}</h2>`;
    const body=isZhOnly?`<div class="trend">${paragraphs(t.body_zh)}</div>`:`<div class="trend zh">${paragraphs(t.body_zh)}</div><div class="trend en">${paragraphs(t.body_en||'')}</div>`;
    return `<article class="card t-${topic}" data-topic="${topic}" data-i="${topic[0]}0">
      <div class="meta"><span class="dot tr"></span>${ac}<span class="sep">/</span><span>${esc(data.date.slice(5))}</span></div>
      ${h2}<div class="rule"></div>${disclaimer}${body}
    </article>`;
  }

  function renderArticle(topic,a,idx){
    const isZhOnly=topic==='invest';
    const cls=P_CLASS[a.priority]||'p4';
    const catZh=a.category_zh||a.category||'';
    const catEn=a.category_en||a.category||'';
    const typeZh=a.type_zh||a.type||'文章';
    const typeEn=a.type_en||a.type||'Article';
    const meta=isZhOnly
      ? `<span class="dot ${cls}"></span><span class="ac">${esc(a.priority)} · ${esc(catZh)}</span><span class="sep">/</span><span>${esc(typeZh)}</span><span class="sep">/</span><span>${esc(a.lang||'ZH')}</span><span class="sep">/</span><span>${esc(a.source)} · ${esc(a.date)}</span>`
      : `<span class="dot ${cls}"></span><span class="ac">${esc(a.priority)} · <span class="zh">${esc(catZh)}</span><span class="en">${esc(catEn)}</span></span><span class="sep">/</span><span class="zh">${esc(typeZh)}</span><span class="en">${esc(typeEn)}</span><span class="sep">/</span><span>${esc(a.lang||'EN')}</span><span class="sep">/</span><span>${esc(a.source)} · ${esc(a.date)}</span>`;
    const h2=isZhOnly?`<h2>${esc(a.title_zh)}</h2>`:`<h2 class="zh">${esc(a.title_zh)}</h2><h2 class="en">${esc(a.title_en||a.title_zh)}</h2>`;
    const sum=isZhOnly?`<p class="sum">${esc(a.summary_zh)}</p>`:`<p class="sum zh">${esc(a.summary_zh)}</p><p class="sum en">${esc(a.summary_en||'')}</p>`;
    const take=isZhOnly?`<p class="take">${esc(a.take_zh)}</p>`:`<p class="take zh">${esc(a.take_zh)}</p><p class="take en">${esc(a.take_en||'')}</p>`;
    const host=urlHost(a.url);
    const hostCls=host==='⚠ invalid url'?'urlhost bad':'urlhost';
    const link=isZhOnly?`<a class="link" href="${esc(safeUrl(a.url))}" target="_blank" rel="noopener">閱讀原文 →</a><span class="${hostCls}">${esc(host)}</span>`:`<a class="link zh" href="${esc(safeUrl(a.url))}" target="_blank" rel="noopener">閱讀原文 →</a><a class="link en" href="${esc(safeUrl(a.url))}" target="_blank" rel="noopener">Read article →</a><span class="${hostCls}">${esc(host)}</span>`;
    const share=`<div><button class="share" data-t="${topic}" data-idx="${idx}"><span class="zh">📤 分享（含摘要 & 觀點）</span><span class="en">📤 Share with summary & take</span></button></div>`;
    return `<article class="card t-${topic}" data-topic="${topic}" data-i="${topic[0]}${idx}">
      <div class="meta">${meta}</div>${h2}<div class="rule"></div>${sum}${take}${link}${share}
    </article>`;
  }

  function renderTab(topic,a,idx){
    const isTrend=idx===0;
    const pri=isTrend?'◇':String(idx).padStart(2,'0');
    const shortZh=isTrend?(topic==='invest'?'本日總經':'本日趨勢'):(a.tab_short_zh||esc(a.title_zh).slice(0,8));
    const shortEn=isTrend?(topic==='invest'?'Macro':'Today'):(a.tab_short_en||a.tab_short_zh||'');
    const content=topic==='invest'
      ? `<span class="pri">${pri}</span><span>${esc(shortZh)}</span>`
      : `<span class="pri">${pri}</span><span class="zh">${esc(shortZh)}</span><span class="en">${esc(shortEn)}</span>`;
    return `<button class="tab t-${topic}" data-topic="${topic}" data-i="${topic[0]}${idx}">${content}</button>`;
  }

  // Build tabs + cards for invest then design (DOM order matches topic switcher)
  let tabsHtml='',cardsHtml='';
  ['invest','design'].forEach(topic=>{
    const t=data[topic];
    tabsHtml+=renderTab(topic,null,0);
    cardsHtml+=renderTake(topic);
    (t.articles||[]).forEach((a,i)=>{
      tabsHtml+=renderTab(topic,a,i+1);
      cardsHtml+=renderArticle(topic,a,i+1);
    });
  });
  tabsEl.innerHTML=tabsHtml;
  cardsEl.innerHTML=cardsHtml;

  document.querySelector('[data-cnt="design"]').textContent=1+(data.design.articles||[]).length;
  document.querySelector('[data-cnt="invest"]').textContent=1+(data.invest.articles||[]).length;

  // Activate first of default topic
  const defaultTopic=data.defaultTopic||'invest';
  document.body.dataset.topic=defaultTopic;
  document.querySelectorAll('#topicsw button').forEach(x=>x.classList.toggle('on',x.dataset.t===defaultTopic));
  wire();
  go(0);
}

let cur=0,topic='invest';
function list(){return Array.from(document.querySelectorAll('.tab[data-topic="'+topic+'"]'))}
function cards(){return Array.from(document.querySelectorAll('.card[data-topic="'+topic+'"]'))}
function go(i){
  const L=list(),C=cards(),n=L.length;if(!n)return;
  if(i<0)i=n-1;if(i>=n)i=0;cur=i;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  L[i].classList.add('active');C[i].classList.add('active');
  L[i].scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  window.scrollTo({top:0,behavior:'instant'});
}
function wire(){
  topic=document.body.dataset.topic;
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    const L=list();const idx=L.indexOf(t);if(idx>=0)go(idx);
  }));
  document.getElementById('prev').addEventListener('click',()=>go(cur-1));
  document.getElementById('next').addEventListener('click',()=>go(cur+1));
  document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
    if(e.key==='ArrowRight'||e.key==='j')go(cur+1);
    else if(e.key==='ArrowLeft'||e.key==='k')go(cur-1);
    else if(/^[1-9]$/.test(e.key)){const i=+e.key-1;if(i<list().length)go(i)}
  });
  let tx=0,ty=0;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){dx<0?go(cur+1):go(cur-1)}
  },{passive:true});
  document.getElementById('langsw').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    const l=b.dataset.l;document.body.dataset.lang=l;
    document.querySelectorAll('#langsw button').forEach(x=>x.classList.toggle('on',x.dataset.l===l));
    document.documentElement.lang=l==='zh'?'zh-TW':'en';
  });
  document.getElementById('cards').addEventListener('click',e=>{
    const b=e.target.closest('.share');
    if(!b)return;
    e.preventDefault();
    shareArticle(b.dataset.t,+b.dataset.idx);
  });
  document.getElementById('topicsw').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    topic=b.dataset.t;document.body.dataset.topic=topic;
    document.querySelectorAll('#topicsw button').forEach(x=>x.classList.toggle('on',x.dataset.t===topic));
    if(topic==='invest'&&document.body.dataset.lang==='en'){
      document.body.dataset.lang='zh';
      document.querySelectorAll('#langsw button').forEach(x=>x.classList.toggle('on',x.dataset.l==='zh'));
      document.documentElement.lang='zh-TW';
    }
    go(0);
  });
}

fetch('data.json?v='+Date.now())
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(render)
  .catch(err=>{
    document.getElementById('root').innerHTML=`<div class="err">無法載入資料<br>${esc(err.message)}</div>`;
  });
</script>
</body>
</html>
